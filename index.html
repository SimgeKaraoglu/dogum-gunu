<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İyi Ki Doğdun Ela</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffd6e7, #fff0c9);
      overflow: hidden;
    }

    .card {
      width: 350px;
      background: white;
      padding: 30px 25px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      z-index: 2;
    }

    .cake {
      font-size: 45px;
      margin-bottom: 10px;
    }

    .photo {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #ff4f81;
      margin-bottom: 15px;
    }

    h1 {
      color: #ff4f81;
      font-size: 30px;
      margin-bottom: 10px;
    }

    h2 {
      color: #444;
      font-size: 22px;
      margin-bottom: 15px;
    }

    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .button {
      display: inline-block;
      background: #ff4f81;
      color: white;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 16px;
    }

    .heart {
      position: absolute;
      color: rgba(255, 79, 129, 0.5);
      font-size: 22px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="cake">🎂</div>

    <img src="jpeg.jpeg" alt="Doğum günü fotoğrafı" class="photo">

    <h1>İyi Ki Doğdun </h1>
    <h2>Canım Kankammm 💖</h2>

    <p>
      Yeni yaşın sana mutluluk, sağlık, başarı ve bolca güzel anı getirsin.
      Hep yüzün gülsün, iyi ki varsın. 💕
    </p>

    <a href="#" class="button">Doğum Günün Kutlu Olsun 🎉</a>
  </div>

  <script>
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 500);
  </script>

</body>
</html>
